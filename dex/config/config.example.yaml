issuer: ${DEX_ISSUER}

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

telemetry:
  http: 0.0.0.0:5558

frontend:
  dir: /srv/dex/web
  theme: supportbot
  issuer: Support Bot
  logoURL: theme/logo.png

oauth2:
  skipApprovalScreen: true

@PASSWORD_DB@

staticClients:
  - id: ${DEX_CLIENT_ID}
    name: Support Bot
    secret: ${DEX_CLIENT_SECRET}
@REDIRECT_URIS@

@CONNECTORS@
