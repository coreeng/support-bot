issuer: ${DEX_ISSUER}

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

telemetry:
  http: 0.0.0.0:5558

oauth2:
  skipApprovalScreen: true

@PASSWORD_DB@

staticClients:
  - id: ${DEX_CLIENT_ID}
    name: Support Bot
    secret: ${DEX_CLIENT_SECRET}
    redirectURIs:
      - ${DEX_REDIRECT_URI_1}
      - ${DEX_REDIRECT_URI_2}
      - ${DEX_REDIRECT_URI_3}
      - ${DEX_REDIRECT_URI_4}
      - ${DEX_REDIRECT_URI_5}
      - ${DEX_REDIRECT_URI_6}

@CONNECTORS@
