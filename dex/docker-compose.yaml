networks:
  supportbot-ldap:
    external: true
    name: supportbot-ldap

services:
  dex:
    image: ghcr.io/dexidp/dex:v2.44.0@sha256:5d0656fce7d453c0e3b2706abf40c0d0ce5b371fb0b73b3cf714d05f35fa5f86
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
      - "5558:5558"
    volumes:
      - ./config/config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/var/dex
    restart: unless-stopped
    networks:
      - default
      - supportbot-ldap

volumes:
  dex-data:
