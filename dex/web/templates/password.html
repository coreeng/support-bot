{{ template "header.html" . }}

<div class="sb-heading">
  <h1>Welcome back</h1>
  <p class="sb-subtitle">Enter your credentials to continue.</p>
  <hr>
</div>

<form method="post" action="{{ .PostURL }}" class="sb-form">
  {{ if .Invalid }}
    <div id="login-error" class="dex-error-box">
      Invalid {{ .UsernamePrompt }} or password.
    </div>
  {{ end }}

  <div class="sb-field">
    <label for="login" class="sb-label">{{ .UsernamePrompt }}</label>
    <input tabindex="1" required id="login" name="login" type="text" class="sb-input" placeholder="{{ .UsernamePrompt | lower }}" {{ if .Username }}value="{{ .Username }}"{{ else }}autofocus{{ end }}>
  </div>

  <div class="sb-field">
    <label for="password" class="sb-label">Password</label>
    <input tabindex="2" required id="password" name="password" type="password" class="sb-input" placeholder="password" {{ if .Invalid }}autofocus{{ end }}>
  </div>

  <button tabindex="3" id="submit-login" type="submit" class="sb-btn sb-btn-primary">Sign in</button>
</form>

{{ if .BackLink }}
  <div class="theme-link-back">
    <a href="{{ .BackLink }}">← Use a different sign-in method</a>
  </div>
{{ end }}

<script type="text/javascript">
  document.querySelector('form').onsubmit = function() {
    var el = document.querySelector('#submit-login');
    el.setAttribute('disabled', 'disabled');
  };
</script>

{{ template "footer.html" . }}
