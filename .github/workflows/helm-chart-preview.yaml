name: helm-chart preview (feat/helm-static-dex-ldap)

# Temporary workflow that publishes a preview of the support-bot Helm chart
# with the Dex subchart vendored inside the package, so a colleague can deploy
# this branch via ArgoCD's OCI Helm source (which does not run
# `helm dependency update`). Delete this file once the permanent fix lands in
# the `publish-chart` target in Makefile.

on:
  push:
    branches:
      - feat/helm-static-dex-ldap
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Compute chart version
        id: ver
        run: |
          short_sha=$(git rev-parse --short=12 HEAD)
          version="0.1.0-helm-static-dex-ldap.${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Vendor subchart deps
        run: |
          helm repo add dex https://charts.dexidp.io
          helm repo update
          helm dependency build helm-chart

      - name: Package chart
        run: |
          mkdir -p dist/charts
          helm package helm-chart \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.short_sha }}" \
            --destination dist/charts

      - name: Verify dex subchart is vendored inside the package
        run: |
          pkg="dist/charts/support-bot-${{ steps.ver.outputs.version }}.tgz"
          # helm may vendor the dep as a tarball (charts/dex-<ver>.tgz) or as
          # an unpacked directory (charts/dex/Chart.yaml). Accept either.
          if ! tar -tzf "$pkg" | grep -Eq '^support-bot/charts/(dex-[0-9].*\.tgz|dex/Chart\.yaml)$'; then
            echo "ERROR: dex subchart was not vendored into $pkg"
            tar -tzf "$pkg" | sed 's/^/  /'
            exit 1
          fi

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push chart to OCI
        run: |
          helm push "dist/charts/support-bot-${{ steps.ver.outputs.version }}.tgz" \
            oci://ghcr.io/coreeng/charts

      - name: Summary
        run: |
          {
            echo "### Preview chart published"
            echo
            echo "- Registry: \`oci://ghcr.io/coreeng/charts/support-bot\`"
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- Pull: \`helm pull oci://ghcr.io/coreeng/charts/support-bot --version ${{ steps.ver.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
