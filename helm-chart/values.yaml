image:
  repository: support-bot
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  role:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 185
  fsGroup: 185
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: support-bot.example
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

readinessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

metrics:
  enabled: true
  port: 8081

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    selector:
      matchLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Sanitisation configuration for data export (optional).
# When both lists are empty, no sanitisation is applied.
# Rendered into the ConfigMap application.yaml under summary-data.sanitisation.
sanitisation:
  patterns: []
  exceptions: []

# Auth allow-list configuration (optional).
# When both lists are empty, all SSO-authenticated users are allowed.
# Rendered into the ConfigMap application.yaml under security.allow-list.
auth:
  allowedDomains: []
  allowedEmails: []

# Optional typed Helm config for pr-review-tracking.
# This block is rendered into application.yaml only when enabled=true.
# Defaults to disabled so existing raw configMap.config behavior remains unchanged.
prReviewTracking:
  enabled: false
# Example:
# prReviewTracking:
#   enabled: true
#   pollCron: "0 0 9-18 * * 1-5" # Cron schedule for the lifecycle poller (example: 09:00 to 18:00 Mon–Fri)
#   prEmoji: "pr" # Slack emoji name added to the message when a PR is detected
#   tags: # Required when enabled: tag codes from enums.tags, applied when the bot auto-closes a ticket
#     - "pull-request" # Required when enabled: tag codes from enums.tags, applied when the bot auto-closes a ticket
#   impact: "prReview" # Required when enabled: impact code from enums.impacts, applied when the bot auto-closes a ticket
#   repositories:
#     # Example A: SLA-backed repo with optional per-event message overrides.
#     - name: "coreeng/core-platform-environment" # Repository in org/repo format
#       owningTeam: "infra-integration" # Team code from enums.escalation-teams — escalated when the SLA is breached
#       sla:
#         file: ".pr-sla.yaml" # optional: read SLA from this file in the repo
#         default: "48h" # default SLA duration (required when sla is set)
#         overrides: # optional: path-specific SLA overrides
#           - path: "infra/**"
#             sla: "7d"
#       messages: # optional: CEL expressions overriding the default tenant-facing Slack messages
#         # Available variables: pr_number (int), pr_url, repo_name, repo_url, owning_team,
#         #                      sla_duration, sla_deadline (empty string when not applicable)
#         # Use string() to convert pr_number in string concatenation, e.g. string(pr_number)
#         detected: '"PR " + string(pr_number) + " detected. SLA: " + sla_duration + ", deadline: " + sla_deadline + "."'
#         escalated: '"Contact #pr-reviews in Slack to chase this review."'
#         approved: '"PR " + string(pr_number) + " approved — ready to merge!"'
#         changesRequested: '"Changes requested on PR " + string(pr_number) + ". Please review the feedback."'
#         merged: '"PR " + string(pr_number) + " merged. Thanks!"'
#         closed: '"PR " + string(pr_number) + " closed."'
#     # Example B: no-SLA repo. escalated must not be set; other messages apply as above.
#     - name: "coreeng/docs"
#       owningTeam: "docs-team"
#       paths: ["docs/**"] # required for no-SLA repos: only track PRs touching these paths
#       messages:
#         detected: '"Engineers monitor this repo regularly. I\'ll keep an eye on this one."'
#   slaDiscovery:
#     cache: "PT24H" # How long to cache SLA files fetched from repositories (default: 24h)
#   github:
#     apiBaseUrl: "${GITHUB_API_BASE_URL:https://api.github.com}" # Supports GitHub Enterprise overrides
#     authMode: "${GITHUB_AUTH_MODE:token}" # token | app
#     token: "${GITHUB_TOKEN:}" # Used when authMode=token
#     appId: "${GITHUB_APP_ID:}" # Used when authMode=app
#     installationId: "${GITHUB_APP_INSTALLATION_ID:}" # Used when authMode=app
#     privateKeyPem: "${GITHUB_APP_PRIVATE_KEY_PEM:}" # Used when authMode=app

# Optional single public origin (scheme + host + port, no path). When set, the chart appends
# UI_ORIGIN on the API deployment and NEXTAUTH_URL on the UI deployment so OAuth redirect validation
# stays aligned. Do not duplicate those env vars in env / ui.env when using this (last duplicate wins in K8s).
publicWebOrigin: ""

# Environment variables
env:
  - name: DB_URL
    value: "jdbc:postgresql://support-bot-db-postgresql:5432/supportbot"
  - name: DB_USERNAME
    value: "supportbot"
  - name: DB_PASSWORD
    value: "supportbotpassword"
  - name: DB_SCHEMA
    value: "public"
  - name: SLACK_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_TOKEN
  - name: SLACK_SOCKET_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SOCKET_TOKEN
  - name: SLACK_SIGNING_SECRET
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SIGNING_SECRET

# Analysis bundle ConfigMap volume mount (disabled by default).
# When enabled, mounts a ConfigMap as the analysis bundle zip file.
analysisBundle:
  enabled: false
  configMapName: "analysis-bundle"
  mountPath: "/app/analysis.zip"
  subPath: "analysis.zip"

# ConfigMap configuration
configMap:
  enabled: true
  create: true
  name: ""
  annotations: {}
  data:
    # your properties for application.yaml

# UI deployment (disabled by default for backward compatibility)
ui:
  enabled: false

  image:
    repository: support-bot-ui
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: support-bot-ui.example
        paths:
          - path: /
            pathType: ImplementationSpecific

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  env: []

  functionalTest:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1536Mi

# ============================================================================
# AUTHENTICATION (Dex is bundled by default)
# ============================================================================
# Pick ONE of:
#   (a) External IdP    → populate dex.config.connectors below (Google / Microsoft / LDAP / OIDC)
#   (b) Static users    → set bundled.staticUsers.enabled: true (further down)
# Opt out entirely:     → set dex.enabled: false (when Dex is deployed elsewhere)
#
# Required regardless of mode (when dex.enabled=true):
#   - publicWebOrigin (top of file)         drives UI_ORIGIN / NEXTAUTH_URL / Dex redirectURIs
#   - dex.config.issuer                     OIDC issuer URL Dex publishes
#   - dex.config.staticClients[0].secret    OAuth client secret shared with the API
#   - ui.env contains AUTH_SECRET           NextAuth requirement on the UI pod
#
# Implementation notes (most users can ignore):
#   - rbac.createClusterScoped is false (sqlite storage, no CRDs) — matches the standalone
#     Dex install (api/k8s/dex/values-dexidp.yaml) so tenant-scoped service accounts work.
#   - configSecret.create is false. The support-bot chart renders the Dex config.yaml itself
#     into Secret/support-bot-dex-config so bundled.staticUsers can fan into Dex without
#     duplicating the four entries under dex.config.staticPasswords. dex.config.connectors /
#     staticClients / issuer keep their natural shape — they're read by the support-bot
#     chart's renderer, not the dex subchart.
# ============================================================================
dex:
  enabled: true
  fullnameOverride: "support-bot-dex"
  replicaCount: 1
  rbac:
    create: true
    createClusterScoped: false
  image:
    repository: ghcr.io/dexidp/dex
    pullPolicy: IfNotPresent
    tag: v2.44.0
  configSecret:
    create: false
    name: "support-bot-dex-config"
  volumes:
    - name: dex-data
      emptyDir: {}
  volumeMounts:
    - name: dex-data
      mountPath: /var/dex
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  # Read by the support-bot chart's dex-config-secret.yaml renderer (not the dex subchart).
  config:
    # Required when dex.enabled=true: the OIDC issuer URL the API and UI should trust.
    # In-cluster default points at the bundled Dex Service. Set to a public URL when exposing
    # Dex via Ingress, e.g. https://dex.example.com.
    issuer: "http://support-bot-dex.default.svc.cluster.local:5556"
    storage:
      type: sqlite3
      config:
        file: /var/dex/dex.db
    web:
      http: 0.0.0.0:5556
    telemetry:
      http: 0.0.0.0:5558
    oauth2:
      skipApprovalScreen: true
    enablePasswordDB: false
    # Auto-populated from bundled.staticUsers when mode (b) is active — leave [] otherwise.
    staticPasswords: []

    # -------------------- Mode (a): External IdP --------------------
    # Populate this list with one or more Dex connectors. See:
    #   https://dexidp.io/docs/connectors/
    # The redirectURI must match what's registered with the IdP. Example for Google:
    #
    # connectors:
    #   - type: google
    #     id: google
    #     name: Google
    #     config:
    #       clientID: "<google-client-id>"
    #       clientSecret: "<google-client-secret>"
    #       redirectURI: https://dex.example.com/callback
    #
    # Leave empty when using mode (b).
    # ----------------------------------------------------------------
    connectors: []
    staticClients:
      - id: support-bot
        name: Support Bot
        # Required when dex.enabled=true; consumed by both Dex (login) and the API
        # (DEX_CLIENT_SECRET env). No default — explicit-only, same posture as bundled passwordHash.
        # Generate: openssl rand -hex 32
        secret: ""
        # Defaults to publicWebOrigin-derived URIs when empty (see _bundled.tpl).
        redirectURIs: []

# -------------------- Mode (b): Bundled static users --------------------
# Set enabled: true to pre-seed four users so login → role works without an
# external IdP. The chart fans each entry out into:
#   - Dex config Secret                                   (enablePasswordDB: true + staticPasswords[])
#   - configMap.config.team.support.static.members        → ROLE_SUPPORT_ENGINEER
#   - configMap.config.team.leadership.static.members     → ROLE_LEADERSHIP
#   - platform-integration.static-user.users.*            → ROLE_ESCALATION (escalation user) and
#                                                           tenant team (tenant user, no role)
#   - platform-integration.teams-scraping.static.teams    → bundled-escalation, bundled-tenant
#   - enums.escalation-teams                              → concatenated with user-supplied entries
#
# passwordHash MUST be set explicitly per role (no defaults) — bcrypt; generate with:
#   htpasswd -bnBC 10 "" 'changeme' | tr -d ':\n' | sed 's/^\$2y/\$2a/'
# (htpasswd ships with Apache httpd — on macOS preinstalled; on Linux install apache2-utils / httpd-tools)
# ------------------------------------------------------------------------
bundled:
  staticUsers:
    enabled: false   # ← flip to true for mode (b); leave false for mode (a) or dex.enabled=false
    leadership:
      email: leadership@supportbot.local
      userID: 11111111-1111-1111-1111-111111111111
      passwordHash: ""
    support:
      email: support@supportbot.local
      userID: 22222222-2222-2222-2222-222222222222
      passwordHash: ""
    escalation:
      email: escalation@supportbot.local
      userID: 33333333-3333-3333-3333-333333333333
      passwordHash: ""
    tenant:
      email: tenant@supportbot.local
      userID: 44444444-4444-4444-4444-444444444444
      passwordHash: ""
