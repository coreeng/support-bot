image:
  repository: support-bot
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  role:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 185
  fsGroup: 185
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: support-bot.example
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

readinessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

metrics:
  enabled: true
  port: 8081

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    selector:
      matchLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Optional single public origin (scheme + host + port, no path). When set, the chart appends
# UI_ORIGIN on the API deployment and NEXTAUTH_URL on the UI deployment so OAuth redirect validation
# stays aligned. Do not duplicate those env vars in env / ui.env when using this (last duplicate wins in K8s).
publicWebOrigin: ""

# Environment variables
env:
  - name: DB_URL
    value: "jdbc:postgresql://support-bot-db-postgresql:5432/supportbot"
  - name: DB_USERNAME
    value: "supportbot"
  - name: DB_PASSWORD
    value: "supportbotpassword"
  - name: DB_SCHEMA
    value: "public"
  - name: SLACK_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_TOKEN
  - name: SLACK_SOCKET_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SOCKET_TOKEN
  - name: SLACK_SIGNING_SECRET
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SIGNING_SECRET

# Analysis bundle ConfigMap volume mount (disabled by default).
# When enabled, mounts a ConfigMap as the analysis bundle zip file.
analysisBundle:
  enabled: false
  configMapName: "analysis-bundle"
  mountPath: "/app/analysis.zip"
  subPath: "analysis.zip"

# ConfigMap configuration
configMap:
  enabled: true
  create: true
  name: ""
  annotations: {}
  config:
    # your properties for application.yaml
    pr-review-tracking:
      tags: []
      impact: ""

# UI deployment (disabled by default for backward compatibility)
ui:
  enabled: false

  image:
    repository: support-bot-ui
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: support-bot-ui.example
        paths:
          - path: /
            pathType: ImplementationSpecific

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  env: []

  functionalTest:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1536Mi

# ============================================================================
# AUTHENTICATION (optional bundled Dex — opt in via dex.enabled: true)
# ============================================================================
# Dex ships as a subchart but is disabled by default. To use it, set
# dex.enabled: true and pick ONE of:
#   (a) External IdP    → populate dex.config.connectors below (Google / Microsoft / LDAP / OIDC)
#   (b) Static users    → set bundled.staticUsers.enabled: true (further down)
#
# Required regardless of mode (when dex.enabled=true):
#   - publicWebOrigin (top of file)         drives UI_ORIGIN / NEXTAUTH_URL / Dex redirectURIs
#   - dex.config.issuer                     OIDC issuer URL Dex publishes
#   - dex.config.staticClients[0].secret    OAuth client secret shared with the API
#   - ui.env contains AUTH_SECRET           NextAuth requirement on the UI pod
#
# Implementation notes (most users can ignore):
#   - rbac.createClusterScoped is false (sqlite storage, no CRDs) — matches the standalone
#     Dex install (api/k8s/dex/values-dexidp.yaml) so tenant-scoped service accounts work.
#   - configSecret.create is false. The support-bot chart renders the Dex config.yaml itself
#     into Secret/support-bot-dex-config so bundled.staticUsers can fan into Dex without
#     duplicating the four entries under dex.config.staticPasswords. dex.config.connectors /
#     staticClients / issuer keep their natural shape — they're read by the support-bot
#     chart's renderer, not the dex subchart.
# ============================================================================
dex:
  enabled: false
  fullnameOverride: "support-bot-dex"
  replicaCount: 1
  rbac:
    create: true
    createClusterScoped: false
  image:
    repository: ghcr.io/dexidp/dex
    pullPolicy: IfNotPresent
    tag: v2.44.0
  configSecret:
    create: false
    name: "support-bot-dex-config"
  volumes:
    - name: dex-data
      emptyDir: {}
  volumeMounts:
    - name: dex-data
      mountPath: /var/dex
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  # Read by the support-bot chart's dex-config-secret.yaml renderer (not the dex subchart).
  config:
    # Required when dex.enabled=true: the OIDC issuer URL the API and UI should trust.
    # In-cluster default points at the bundled Dex Service. Set to a public URL when exposing
    # Dex via Ingress, e.g. https://dex.example.com.
    issuer: "http://support-bot-dex.default.svc.cluster.local:5556"
    storage:
      type: sqlite3
      config:
        file: /var/dex/dex.db
    web:
      http: 0.0.0.0:5556
    telemetry:
      http: 0.0.0.0:5558
    oauth2:
      skipApprovalScreen: true
    enablePasswordDB: false
    # Auto-populated from bundled.staticUsers when mode (b) is active — leave [] otherwise.
    staticPasswords: []

    # -------------------- Mode (a): External IdP --------------------
    # Populate this list with one or more Dex connectors. See:
    #   https://dexidp.io/docs/connectors/
    # The redirectURI must match what's registered with the IdP. Example for Google:
    #
    # connectors:
    #   - type: google
    #     id: google
    #     name: Google
    #     config:
    #       clientID: "<google-client-id>"
    #       clientSecret: "<google-client-secret>"
    #       redirectURI: https://dex.example.com/callback
    #
    # Leave empty when using mode (b).
    # ----------------------------------------------------------------
    connectors: []
    staticClients:
      - id: support-bot
        name: Support Bot
        # Set ONE of:
        #   - secret: <plaintext>                               inline; generate with openssl rand -hex 32
        #   - leave secret empty AND provide a DEX_CLIENT_SECRET entry in dex.envVars below
        #     pointing at an externally-managed K8s Secret (see "Externalising the client
        #     secret" example further down). Dex resolves $DEX_CLIENT_SECRET at startup
        #     via os.ExpandEnv; the API reuses the same valueFrom for its own env.
        # No default — explicit-only, same posture as bundled passwordHash.
        secret: ""
        # Defaults to publicWebOrigin-derived URIs when empty (see _bundled.tpl).
        redirectURIs: []

  # ----------------------------------------------------------------
  # Externalising the client secret (no plaintext in values.yaml)
  # ----------------------------------------------------------------
  # Operators using sealed-secrets / external-secrets-operator / vault can
  # leave dex.config.staticClients[0].secret empty and reference an existing
  # K8s Secret here instead:
  #
  #   envVars:
  #     - name: DEX_CLIENT_SECRET
  #       valueFrom:
  #         secretKeyRef:
  #           name: support-bot-dex-creds
  #           key: client-secret
  #
  # When this is set, the chart writes `secret: $DEX_CLIENT_SECRET` into the
  # rendered Dex config (Dex's expand_env feature, default-true in 2.44.0,
  # resolves it at startup) and points the API's DEX_CLIENT_SECRET env at the
  # same valueFrom. Don't set both — the chart will fail-fast with a clear
  # message.
  envVars: []

# -------------------- Mode (b): Bundled static users --------------------
# Set enabled: true to pre-seed four users so login → role works without an
# external IdP. The chart fans each entry out into:
#   - Dex config Secret                                   (enablePasswordDB: true + staticPasswords[])
#   - configMap.config.team.support.static.members        → ROLE_SUPPORT_ENGINEER
#   - configMap.config.team.leadership.static.members     → ROLE_LEADERSHIP
#   - platform-integration.static-user.users.*            → ROLE_ESCALATION (escalation user) and
#                                                           tenant team (tenant user, no role)
#   - platform-integration.teams-scraping.static.teams    → bundled-escalation, bundled-tenant
#   - enums.escalation-teams                              → concatenated with user-supplied entries
#
# passwordHash MUST be set explicitly per role (no defaults) — bcrypt; generate with:
#   htpasswd -bnBC 10 "" 'changeme' | tr -d ':\n' | sed 's/^\$2y/\$2a/'
# (htpasswd ships with Apache httpd — on macOS preinstalled; on Linux install apache2-utils / httpd-tools)
# ------------------------------------------------------------------------
bundled:
  staticUsers:
    enabled: false   # ← flip to true for mode (b); leave false for mode (a) or dex.enabled=false
    leadership:
      email: leadership@supportbot.local
      userID: 11111111-1111-1111-1111-111111111111
      passwordHash: ""
    support:
      email: support@supportbot.local
      userID: 22222222-2222-2222-2222-222222222222
      passwordHash: ""
    escalation:
      email: escalation@supportbot.local
      userID: 33333333-3333-3333-3333-333333333333
      passwordHash: ""
    tenant:
      email: tenant@supportbot.local
      userID: 44444444-4444-4444-4444-444444444444
      passwordHash: ""
