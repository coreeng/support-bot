image:
  repository: support-bot
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  role:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 185
  fsGroup: 185
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: support-bot.example
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

readinessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

metrics:
  enabled: true
  port: 8081

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    selector:
      matchLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Optional single public origin (scheme + host + port, no path). When set, the chart appends
# UI_ORIGIN on the API deployment and NEXTAUTH_URL on the UI deployment so OAuth redirect validation
# stays aligned. Do not duplicate those env vars in env / ui.env when using this (last duplicate wins in K8s).
publicWebOrigin: ""

# Environment variables
env:
  - name: DB_URL
    value: "jdbc:postgresql://support-bot-db-postgresql:5432/supportbot"
  - name: DB_USERNAME
    value: "supportbot"
  - name: DB_PASSWORD
    value: "supportbotpassword"
  - name: DB_SCHEMA
    value: "public"
  - name: SLACK_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_TOKEN
  - name: SLACK_SOCKET_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SOCKET_TOKEN
  - name: SLACK_SIGNING_SECRET
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SIGNING_SECRET

# Analysis bundle ConfigMap volume mount (disabled by default).
# When enabled, mounts a ConfigMap as the analysis bundle zip file.
analysisBundle:
  enabled: false
  configMapName: "analysis-bundle"
  mountPath: "/app/analysis.zip"
  subPath: "analysis.zip"

# ConfigMap configuration
configMap:
  enabled: true
  create: true
  name: ""
  annotations: {}
  config:
    # your properties for application.yaml
    pr-review-tracking:
      tags: []
      impact: ""

# UI deployment (disabled by default for backward compatibility)
ui:
  enabled: false

  image:
    repository: support-bot-ui
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: support-bot-ui.example
        paths:
          - path: /
            pathType: ImplementationSpecific

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  env: []

  functionalTest:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1536Mi

