suite: dex client secret externalisation
templates:
  - templates/dex-config-secret.yaml
  - templates/dex-client-secret.yaml
  - templates/deployment.yaml
tests:
  - it: renders Dex config with $DEX_CLIENT_SECRET placeholder when externalised
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
      dex.envVars:
        - name: DEX_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ext-creds
              key: client-secret
    asserts:
      - matchRegex:
          path: stringData["config.yaml"]
          pattern: 'secret:\s+\$DEX_CLIENT_SECRET'
        template: templates/dex-config-secret.yaml

  - it: dex-client mirror Secret omits client-secret when externalised
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
      dex.envVars:
        - name: DEX_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ext-creds
              key: client-secret
    asserts:
      - equal:
          path: stringData.client-id
          value: support-bot
        template: templates/dex-client-secret.yaml
      - notExists:
          path: stringData.client-secret
        template: templates/dex-client-secret.yaml

  - it: API DEX_CLIENT_SECRET env reuses the operator's secretKeyRef
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
      dex.envVars:
        - name: DEX_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ext-creds
              key: client-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEX_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: ext-creds
                key: client-secret
        template: templates/deployment.yaml

  - it: inline mode keeps client-secret in the mirror Secret
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
    asserts:
      - equal:
          path: stringData.client-secret
          value: inline-test-secret
        template: templates/dex-client-secret.yaml

  - it: fails when neither inline secret nor envVars entry is set
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
    asserts:
      - failedTemplate:
          errorPattern: "dex client secret is required when dex.enabled=true"
        template: templates/dex-config-secret.yaml

  - it: fails when both inline secret and envVars entry are set
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
      dex.envVars:
        - name: DEX_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ext-creds
              key: client-secret
    asserts:
      - failedTemplate:
          errorPattern: "ambiguous: both .* AND a DEX_CLIENT_SECRET entry"
        template: templates/dex-config-secret.yaml

  - it: fails when dex.enabled=true and both publicWebOrigin and staticClients[0].redirectURIs are empty
    set:
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
    asserts:
      - failedTemplate:
          errorPattern: "publicWebOrigin is required when dex.enabled=true"
        template: templates/dex-config-secret.yaml

  - it: redirectURIs auto-derive from publicWebOrigin
    set:
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
    asserts:
      - matchRegex:
          path: stringData["config.yaml"]
          pattern: 'https://support-bot\.example/login/oauth2/code/dex'
        template: templates/dex-config-secret.yaml
      - matchRegex:
          path: stringData["config.yaml"]
          pattern: 'https://support-bot\.example/api/oauth/callback/dex'
        template: templates/dex-config-secret.yaml

  - it: explicit redirectURIs satisfy the validator even when publicWebOrigin is empty
    set:
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
          redirectURIs:
            - https://app.example/login/oauth2/code/dex
            - https://app.example/api/oauth/callback/dex
    asserts:
      - matchRegex:
          path: stringData["config.yaml"]
          pattern: 'https://app\.example/login/oauth2/code/dex'
        template: templates/dex-config-secret.yaml
