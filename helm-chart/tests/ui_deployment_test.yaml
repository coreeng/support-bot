suite: ui deployment
templates:
  - templates/ui-deployment.yaml
tests:
  - it: does not render the UI deployment by default
    asserts:
      - hasDocuments:
          count: 0

  - it: appends NEXTAUTH_URL when ui and publicWebOrigin are set
    set:
      ui.enabled: true
      publicWebOrigin: "https://support-bot.example"
      ui.env:
        - name: AUTH_SECRET
          value: test
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEXTAUTH_URL
            value: "https://support-bot.example"

  - it: renders the default UI container and cache volume when enabled
    set:
      ui.enabled: true
      ui.env:
        - name: AUTH_SECRET
          value: test
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
      - contains:
          path: spec.template.spec.volumes
          content:
            name: nextjs-cache
            emptyDir: {}

  - it: does not append NEXTAUTH_URL without publicWebOrigin
    set:
      ui.enabled: true
      ui.env:
        - name: AUTH_SECRET
          value: test
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEXTAUTH_URL

  - it: renders without AUTH_SECRET in ui.env when dex.enabled=false (operator may inject out-of-band)
    set:
      ui.enabled: true
      ui.env: []
    asserts:
      - isKind:
          of: Deployment

  - it: fails when ui.enabled=true and dex.enabled=true but AUTH_SECRET is missing from ui.env
    set:
      ui.enabled: true
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
      ui.env: []
    asserts:
      - failedTemplate:
          errorPattern: "ui.env must include AUTH_SECRET"

  - it: fails when ui.env AUTH_SECRET entry is name-only (no value or valueFrom)
    set:
      ui.enabled: true
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
      ui.env:
        - name: AUTH_SECRET
    asserts:
      - failedTemplate:
          errorPattern: "ui.env must include AUTH_SECRET"

  - it: AUTH_SECRET valueFrom satisfies the validator
    set:
      ui.enabled: true
      publicWebOrigin: https://support-bot.example
      dex.enabled: true
      dex.config.issuer: https://dex.example
      dex.config.staticClients:
        - id: support-bot
          name: Support Bot
          secret: inline-test-secret
      ui.env:
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: ui-creds
              key: auth-secret
    asserts:
      - isKind:
          of: Deployment