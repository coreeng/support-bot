{{- if .Values.configMap.create -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMap.name | default (include "support-bot.fullname" .) }}
  labels:
    {{- include "support-bot.labels" . | nindent 4 }}
  {{- with .Values.configMap.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
#trivy:ignore:AVD-KSV-0109 ConfigMap contains placeholder refs; real secrets are provided via K8s Secrets
  application.yaml: |
    {{- toYaml (.Values.configMap.config | default dict) | nindent 4 }}
    {{- with .Values.sanitisation.patterns }}
    summary-data.sanitisation.patterns:
    {{- range . }}
      - {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.sanitisation.exceptions }}
    summary-data.sanitisation.exceptions:
    {{- range . }}
      - {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.auth.allowedEmails }}
    security.allow-list.emails:
    {{- range . }}
      - {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.auth.allowedDomains }}
    security.allow-list.domains:
    {{- range . }}
      - {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- if .Values.prReviewTracking.enabled }}
    pr-review-tracking:
      enabled: true
      poll-cron: {{ .Values.prReviewTracking.pollCron | default "0 0 9-18 * * 1-5" | quote }}
      pr-emoji: {{ .Values.prReviewTracking.prEmoji | default "pr" | quote }}
      {{- if .Values.prReviewTracking.tags }}
      tags:
      {{- range .Values.prReviewTracking.tags }}
        - {{ . | quote }}
      {{- end }}
      {{- else }}
      tags: [ ]
      {{- end }}
      impact: {{ .Values.prReviewTracking.impact | default "" | quote }}
      {{- if .Values.prReviewTracking.repositories }}
      repositories:
      {{- range .Values.prReviewTracking.repositories }}
        - name: {{ .name | quote }}
          owning-team: {{ .owningTeam | quote }}
          {{- if .sla }}
          {{- if not .sla.default }}
          {{- fail (printf "prReviewTracking.repositories[].sla.default is required when sla is set, repo: %s" .name) }}
          {{- end }}
          sla:
            {{- if .sla.file }}
            file: {{ .sla.file | quote }}
            {{- end }}
            default: {{ .sla.default | quote }}
            {{- if .sla.overrides }}
            overrides:
            {{- range .sla.overrides }}
              - path: {{ .path | quote }}
                sla: {{ .sla | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if .paths }}
          paths:
          {{- range .paths }}
            - {{ . | quote }}
          {{- end }}
          {{- end }}
          {{- if .messages }}
          messages:
            {{- if .messages.detected }}
            detected: {{ .messages.detected | quote }}
            {{- end }}
            {{- if .messages.escalated }}
            escalated: {{ .messages.escalated | quote }}
            {{- end }}
            {{- if .messages.approved }}
            approved: {{ .messages.approved | quote }}
            {{- end }}
            {{- if .messages.changesRequested }}
            changes-requested: {{ .messages.changesRequested | quote }}
            {{- end }}
            {{- if .messages.merged }}
            merged: {{ .messages.merged | quote }}
            {{- end }}
            {{- if .messages.closed }}
            closed: {{ .messages.closed | quote }}
            {{- end }}
          {{- end }}
      {{- end }}
      {{- else }}
      repositories: [ ]
      {{- end }}
      github:
        api-base-url: {{ .Values.prReviewTracking.github.apiBaseUrl | default "${GITHUB_API_BASE_URL:https://api.github.com}" | quote }}
        auth-mode: {{ .Values.prReviewTracking.github.authMode | default "${GITHUB_AUTH_MODE:token}" | quote }}
        token: "${GITHUB_TOKEN:}"
        app-id: {{ .Values.prReviewTracking.github.appId | default "${GITHUB_APP_ID:}" | quote }}
        installation-id: {{ .Values.prReviewTracking.github.installationId | default "${GITHUB_APP_INSTALLATION_ID:}" | quote }}
        private-key-pem: "${GITHUB_APP_PRIVATE_KEY_PEM:}"
    {{- end }}
{{- end }}
