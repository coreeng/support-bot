{{- if .Values.dex.enabled }}
{{- /* Mirror dex.config.staticClients[0].secret into a K8s Secret so the API can read it via secretKeyRef. */ -}}
{{- $client := index .Values.dex.config.staticClients 0 }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "support-bot.dex.clientSecretName" . }}
  labels:
    {{- include "support-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ $client.id | quote }}
  client-secret: {{ $client.secret | quote }}
{{- end }}
