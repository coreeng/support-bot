{{- if .Values.dex.enabled }}
{{- /*
  Mirror dex.config.staticClients[0].secret into a K8s Secret so the API can
  read it via secretKeyRef. When the client secret is externalized (operator
  provides a DEX_CLIENT_SECRET entry in dex.envVars), only mirror the non-
  sensitive client-id here — the API's DEX_CLIENT_SECRET env reads directly
  from the operator's Secret in that mode.
*/ -}}
{{- $client := index .Values.dex.config.staticClients 0 }}
{{- $mode := include "support-bot.dex.clientSecretMode" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "support-bot.dex.clientSecretName" . }}
  labels:
    {{- include "support-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ $client.id | quote }}
  {{- if eq $mode "inline" }}
  client-secret: {{ $client.secret | quote }}
  {{- end }}
{{- end }}
