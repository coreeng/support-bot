{{- if .Values.ui.enabled -}}
{{- include "support-bot.ui.validateAuthSecret" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "support-bot.ui.fullname" . }}
  labels:
    {{- include "support-bot.ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "support-bot.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.ui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "support-bot.ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "support-bot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.ui.podSecurityContext | nindent 8 }}
      containers:
        - name: ui
          securityContext:
            {{- toYaml .Values.ui.securityContext | nindent 12 }}
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          env:
            {{- $uiEnv := .Values.ui.env | default list }}
            {{- if .Values.publicWebOrigin }}
            {{- $uiEnv = append $uiEnv (dict "name" "NEXTAUTH_URL" "value" .Values.publicWebOrigin) }}
            {{- end }}
            {{- $hasBackendUrl := false }}
            {{- range $uiEnv }}
            {{- if eq .name "BACKEND_URL" }}{{- $hasBackendUrl = true }}{{- end }}
            {{- end }}
            {{- if not $hasBackendUrl }}
            {{- $apiSvc := printf "http://%s.%s.svc.cluster.local:%v" (include "support-bot.fullname" .) .Release.Namespace .Values.service.port }}
            {{- $uiEnv = append $uiEnv (dict "name" "BACKEND_URL" "value" $apiSvc) }}
            {{- end }}
            {{- toYaml $uiEnv | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.ui.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ui.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
