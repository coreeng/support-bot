apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "support-bot.fullname" . }}
  labels:
    {{- include "support-bot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "support-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- /* Roll the API pod when Dex client secret or rendered Dex config change,
               otherwise inline-secret rotation and issuer/redirectURI updates would
               apply via Helm without the API picking them up. */}}
        {{- if .Values.dex.enabled }}
        checksum/dex-client: {{ include (print $.Template.BasePath "/dex-client-secret.yaml") . | sha256sum }}
        checksum/dex-config: {{ include (print $.Template.BasePath "/dex-config-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "support-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "support-bot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            {{- $apiEnv := .Values.env | default list }}
            {{- if .Values.publicWebOrigin }}
            {{- $apiEnv = append $apiEnv (dict "name" "UI_ORIGIN" "value" .Values.publicWebOrigin) }}
            {{- end }}
            {{- if .Values.dex.enabled }}
            {{- $apiEnv = append $apiEnv (dict "name" "DEX_CLIENT_ID" "valueFrom" (dict "secretKeyRef" (dict "name" (include "support-bot.dex.clientSecretName" .) "key" "client-id"))) }}
            {{- if eq (include "support-bot.dex.clientSecretMode" .) "external" }}
            {{- /* Reuse the operator-provided secretKeyRef (or value:) from dex.envVars verbatim. */ -}}
            {{- range .Values.dex.envVars }}
            {{- if eq (.name | default "") "DEX_CLIENT_SECRET" }}
            {{- $apiEnv = append $apiEnv . }}
            {{- end }}
            {{- end }}
            {{- else }}
            {{- $apiEnv = append $apiEnv (dict "name" "DEX_CLIENT_SECRET" "valueFrom" (dict "secretKeyRef" (dict "name" (include "support-bot.dex.clientSecretName" .) "key" "client-secret"))) }}
            {{- end }}
            {{- $apiEnv = append $apiEnv (dict "name" "DEX_ISSUER_URI" "value" .Values.dex.config.issuer) }}
            {{- $apiEnv = append $apiEnv (dict "name" "DEX_INTERNAL_BASE_URL" "value" (include "support-bot.dex.internalBaseURL" .)) }}
            {{- end }}
            {{- toYaml $apiEnv | nindent 12 }}
            {{- if .Values.analysisBundle.enabled }}
            - name: SUMMARY_DATA_ANALYSIS_BUNDLE_PATH
              value: {{ .Values.analysisBundle.mountPath | default "/app/analysis.zip" }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.analysisBundle.enabled }}
            - name: analysis-bundle
              mountPath: {{ .Values.analysisBundle.mountPath | default "/app/analysis.zip" }}
              subPath: {{ .Values.analysisBundle.subPath | default "analysis.zip" }}
            {{- end }}
            {{- if .Values.configMap.enabled }}
            - name: config
              mountPath: /app/config
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.analysisBundle.enabled }}
        - name: analysis-bundle
          configMap:
            name: {{ .Values.analysisBundle.configMapName | default "analysis-bundle" }}
        {{- end }}
        {{- if .Values.configMap.enabled }}
        - name: config
          configMap:
            name: {{ .Values.configMap.name | default (include "support-bot.fullname" .) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
