{{- if .Values.dex.enabled }}
{{- include "support-bot.dex.validateClientSecret" . }}
{{- include "support-bot.bundled.validate" . }}
{{- /*
  Build the effective Dex config:
    - start from .Values.dex.config (deep-copied so we don't mutate the subchart's view)
    - default staticClients[0].redirectURIs from publicWebOrigin when empty
    - inject bundled.staticUsers into staticPasswords when bundled.staticUsers.enabled=true
*/ -}}
{{- $cfg := deepCopy .Values.dex.config -}}
{{- if .Values.bundled.staticUsers.enabled -}}
{{- $_ := set $cfg "enablePasswordDB" true -}}
{{- $passwords := list -}}
{{- range $role := list "leadership" "support" "escalation" "tenant" -}}
{{- $u := index $.Values.bundled.staticUsers $role -}}
{{- $passwords = append $passwords (dict
    "email" $u.email
    "hash" $u.passwordHash
    "username" $role
    "userID" $u.userID) -}}
{{- end -}}
{{- $_ := set $cfg "staticPasswords" $passwords -}}
{{- end -}}
{{- $client := index $cfg.staticClients 0 -}}
{{- if and (not $client.redirectURIs) .Values.publicWebOrigin -}}
{{- $_ := set $client "redirectURIs" (list
    (printf "%s/login/oauth2/code/dex" .Values.publicWebOrigin)
    (printf "%s/api/oauth/callback/dex" .Values.publicWebOrigin)) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dex.configSecret.name | default "support-bot-dex-config" }}
  labels:
    {{- include "support-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    {{- toYaml $cfg | nindent 4 }}
{{- end }}
