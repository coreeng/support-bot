security:
  test-bypass:
    enabled: true

spring:
  cloud:
    azure:
      profile:
        tenant-id: ${AZURE_TENANT_ID}
      credential:
        client-id: ${AZURE_CLIENT_ID}
        client-secret: ${AZURE_CLIENT_SECRET}
# Integration tests do not exercise PR tracking; opt out so the base config's
# enabled=true (kept on for sandbox dogfood) doesn't drag this profile into
# requiring a GitHub token that isn't provisioned in the integration namespace.
pr-review-tracking:
  enabled: false

enums:
  escalation-teams:
    - label: core
      code: core
      group-ref: "slack:S08948NBMED"
platform-integration:
  enabled: true
  azure:
    enabled: true
  static-user:
    enabled: false
  teams-scraping:
    static:
      enabled: false
    core-platform:
      enabled: false
    k8s-generic:
      enabled: true
      config:
        api-version: v1
        kind: ConfigMap
        namespace: support-bot-integration
        filter:
          name-regexp: ^tenant-.*
          label-selector: null
        teamName:
          cel-expression: resource.data.name
        groupRef:
          cel-expression: resource.data.groupRef

analysis:
  prompt:
    enabled: true
