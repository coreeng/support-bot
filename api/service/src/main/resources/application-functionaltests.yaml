security:
  jwt:
    secret: functional-test-jwt-secret-min-256-bits
    expiration: 24h
  oauth2:
    redirect-uri: ${UI_ORIGIN:http://localhost:3000}/login
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  test-bypass:
    enabled: true
  allow-list:
    emails: ${ALLOWED_EMAILS:}
    domains: ${ALLOWED_DOMAINS:}

slack:
  mode: http
  enable-request-verification: false
  client:
    methods-base-url: "http://localhost:8000/api/"
  creds:
    token: dummy-token-dummy-token
  ticket:
    channel-id: C1234567891
    expected-initial-reaction: eyes
    response-initial-reaction: ticket

ticket:
  assignment:
    enabled: true
    encryption:
      key: dummy-encryption-key-for-functional-tests-32-chars-long-at-least

enums:
  escalation-teams:
    - label: WoW
      code: wow
      slack-group-id: S01234ESCWW
    - label: Infra Integration
      code: infra-integration
      slack-group-id: S01234ESCII
#    - label: connected-app
#      code: connected-app
#      slack-group-id: S01234ESCCA
  tags:
    - label: Ingresses
      code: ingresses
    - label: Jenkins Pipelines
      code: jenkins-pipelines
    - label: Networking
      code: networking
    - label: Vault
      code: vault
    - label: Persistence/Brokers
      code: persistence-brokers
    - label: Observability
      code: observability
    - label: DNS
      code: dns
    - label: Osprey
      code: osprey
  impacts:
    - label: Production Blocking
      code: productionBlocking
    - label: BAU Blocking
      code: bauBlocking
    - label: Abnormal Behaviour
      code: abnormalBehaviour

team:
  support:
    name: Core Support
    code: support
    slack-group-id: S01234567ST
    static:
      enabled: true
      members:
        - email: coby.ivona@company.com
          slack-id: U0123456781
        - email: sana.chernobog@company.com
          slack-id: U0123456782
        - email: jean.kristijan@company.com
          slack-id: U0123456783
  leadership:
    name: Support Leadership
    code: support-leadership
    slack-group-id: S01234LEADER
    static:
      enabled: true
      members:
        - email: brian@company.com
          slack-id: U0124556781

# PR review tracking: app must use GITHUB_API_BASE_URL pointing to wiremock (e.g. http://localhost:8000)
pr-review-tracking:
  enabled: true
  pr-emoji: pr
  tags: networking
  impact: productionBlocking
  repositories:
    - name: test-org/pr-test-repo
      owning-team: wow
      sla: PT24H
  github:
    api-base-url: ${GITHUB_API_BASE_URL:http://localhost:8000}
    auth-mode: token
    token: ${GITHUB_TOKEN:dummy-github-token}

platform-integration:
  enabled: true
  gcp:
    enabled: false
  azure:
    enabled: false
  static-user:
    enabled: true
    users:
      group-ref-wow:
        - coby.ivona@company.com
        - sana.chernobog@company.com
      group-ref-infra-integration:
        - jean.kristijan@company.com
        - chandra.giustino@company.com
      group-ref-connected-app:
        - chandra.giustino@company.com
        - nazira.armel@company.com
  teams-scraping:
    core-platform:
      enabled: false
    static:
      enabled: true
      teams:
        - name: wow
          groupRef: group-ref-wow
        - name: infra-integration
          groupRef: group-ref-infra-integration
        - name: connected-app
          groupRef: group-ref-connected-app

analysis:
  vertex:
    project-id: "false"
    request-delay: 10ms
  prompt:
    enabled: true
    file: ${ANALYSIS_PROMPT_FILE:service/analysis/prompt.md}
