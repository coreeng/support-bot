# PR review tracking: app must use GITHUB_API_BASE_URL pointing to wiremock (e.g. http://localhost:8000)
pr-review-tracking:
  enabled: true
  pr-emoji: pr
  tags: networking
  impact: productionBlocking
  repositories:
    - name: test-org/pr-test-repo
      owning-team: wow
      sla:
        default: PT24H
    - name: test-org/pr-sla-file-repo
      owning-team: wow
      sla:
        file: ".pr-sla.yaml"
        default: PT24H
    - name: test-org/pr-sla-override-repo
      owning-team: wow
      sla:
        file: ".pr-sla.yaml"
        default: PT48H
    - name: test-org/pr-escalation-message-repo
      owning-team: wow
      sla:
        default: PT24H
      messages:
        escalated: '"Contact #pr-reviews in Slack to chase this review."'
    # Author-admission gate: poster (functional-user@example.com) is in the pr-author-excluded team -> skipped.
    - name: test-org/pr-author-excluded-repo
      owning-team: wow
      exclude-author-teams: [pr-author-excluded]
      sla:
        default: PT24H
    # Author-admission gate: deny-list configured but poster is NOT in the 'wow' team -> tracked.
    - name: test-org/pr-author-admitted-repo
      owning-team: wow
      exclude-author-teams: [wow]
      sla:
        default: PT24H
    # Code-owner repo: merge is gated on code-owner approval (read from GitHub's GraphQL reviewDecision).
    - name: test-org/pr-codeowners-repo
      owning-team: wow
      requires-codeowners: true
      sla:
        default: PT24H
    - name: gitlab-org/gitlab-pr-test-repo
      owning-team: wow
      provider: gitlab
      gitlab-group-path: gitlab-org
      sla:
        default: PT24H
    - name: gitlab-org/gitlab-pr-sla-file-repo
      owning-team: wow
      provider: gitlab
      gitlab-group-path: gitlab-org
      sla:
        file: ".pr-sla.yaml"
        default: PT24H
    - name: gitlab-org/gitlab-pr-escalation-message-repo
      owning-team: wow
      provider: gitlab
      gitlab-group-path: gitlab-org
      sla:
        default: PT24H
      messages:
        escalated: '"Contact #mr-reviews in Slack to chase this review."'
  sla-discovery:
    cache: PT5M
  github:
    api-base-url: ${GITHUB_API_BASE_URL:http://localhost:8000}
    auth-mode: token
    token: ${GITHUB_TOKEN:dummy-github-token}
  gitlab:
    api-base-url: ${GITLAB_API_BASE_URL:http://localhost:8000/api/v4}
    token: ${GITLAB_TOKEN:dummy-gitlab-token}

