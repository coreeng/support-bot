# Template: replace PLACEHOLDER_NAMESPACE before apply. Job name is set in Java (unique per run).
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER_JOB_NAME
  namespace: PLACEHOLDER_NAMESPACE
  labels:
    app.kubernetes.io/component: integration-smoke
    app.kubernetes.io/name: support-bot-dex-ldap-infra
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke
          # curl + ldapsearch preinstalled (no runtime apk); satisfies readOnlyRootFilesystem policies
          image: nicolaka/netshoot:v0.13
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: DEX_HOST
              value: "dex"
            - name: DEX_TELEMETRY_PORT
              value: "5558"
            - name: LDAP_HOST
              value: "ldap"
            - name: LDAP_PORT
              value: "389"
            - name: LDAP_BIND_DN
              value: "cn=admin,dc=supportbot,dc=local"
            - name: LDAP_BIND_PW
              valueFrom:
                secretKeyRef:
                  name: ldap-secrets
                  key: admin-password
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "Checking Dex telemetry health at http://${DEX_HOST}:${DEX_TELEMETRY_PORT}/healthz/live ..."
              curl -sfS "http://${DEX_HOST}:${DEX_TELEMETRY_PORT}/healthz/live" >/dev/null
              echo "OK_DEX"
              echo "Checking LDAP uid=alice at ldap://${LDAP_HOST}:${LDAP_PORT} ..."
              ldapsearch -x -o ldif-wrap=no -H "ldap://${LDAP_HOST}:${LDAP_PORT}" \
                -D "${LDAP_BIND_DN}" -w "${LDAP_BIND_PW}" \
                -b "dc=supportbot,dc=local" "(uid=alice)" | grep -q "^dn: uid=alice"
              echo "OK_LDAP"
              echo "OK_ALL"
      volumes:
        - name: tmp
          emptyDir: {}
