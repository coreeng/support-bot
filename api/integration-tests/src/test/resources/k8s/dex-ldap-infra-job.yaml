# Template: replace PLACEHOLDER_NAMESPACE before apply. Job name is set in Java (unique per run).
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER_JOB_NAME
  namespace: PLACEHOLDER_NAMESPACE
  labels:
    app.kubernetes.io/component: integration-smoke
    app.kubernetes.io/name: support-bot-dex-ldap-infra
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: alpine:3.20
          env:
            - name: DEX_HOST
              value: "dex"
            - name: DEX_TELEMETRY_PORT
              value: "5558"
            - name: LDAP_HOST
              value: "ldap"
            - name: LDAP_PORT
              value: "389"
            - name: LDAP_BIND_DN
              value: "cn=admin,dc=supportbot,dc=local"
            - name: LDAP_BIND_PW
              valueFrom:
                secretKeyRef:
                  name: ldap-secrets
                  key: admin-password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              apk add --no-cache curl openldap-clients >/dev/null
              echo "Checking Dex telemetry health at http://${DEX_HOST}:${DEX_TELEMETRY_PORT}/healthz/live ..."
              curl -sfS "http://${DEX_HOST}:${DEX_TELEMETRY_PORT}/healthz/live" >/dev/null
              echo "OK_DEX"
              echo "Checking LDAP uid=alice at ldap://${LDAP_HOST}:${LDAP_PORT} ..."
              ldapsearch -x -o ldif-wrap=no -H "ldap://${LDAP_HOST}:${LDAP_PORT}" \
                -D "${LDAP_BIND_DN}" -w "${LDAP_BIND_PW}" \
                -b "dc=supportbot,dc=local" "(uid=alice)" | grep -q "^dn: uid=alice"
              echo "OK_LDAP"
              echo "OK_ALL"
