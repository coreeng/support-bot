# Defaults for support-bot-openldap (Bitnami OpenLDAP image).
# Override from api/k8s/ldap/values-bitnami.yaml and values-integration.yaml.

fullnameOverride: ""

image:
  repository: bitnami/openldap
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  # Plain LDAP port. Set to 0 and enable tls.port to go LDAPS-only.
  port: 389

# TLS / LDAPS (disabled by default — plaintext LDAP for local-dev only).
# For integration / production, enable TLS and supply a cert Secret.
# See docs/runbooks/auth-dex-ldap.md § "Enabling LDAPS / StartTLS".
tls:
  enabled: false
  # Additional LDAPS port exposed on the Service (636 by convention).
  port: 636
  # K8s TLS Secret with tls.crt, tls.key, and optionally ca.crt.
  certSecret: ""
  # Mount paths inside the container (Bitnami defaults).
  certFilename: tls.crt
  keyFilename: tls.key
  caFilename: ca.crt

# K8s Secret holding the directory admin password.
# WARNING: without TLS the admin password travels in plaintext — acceptable for
# local dev / ephemeral integration clusters only.
existingSecret: ldap-secrets
existingSecretPasswordKey: admin-password

# LDAP_ROOT / base suffix (admin DN becomes cn=<adminUsername>,<root>).
ldapRoot: dc=supportbot,dc=local
adminUsername: admin

resources: {}

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
