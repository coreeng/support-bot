apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "support-bot-openldap.fullname" . }}-bootstrap
  labels:
    {{- include "support-bot-openldap.labels" . | nindent 4 }}
data:
{{- range $path, $_ := .Files.Glob "files/bootstrap/*.ldif" }}
  {{ base $path }}: |
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
