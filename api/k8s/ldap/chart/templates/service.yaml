apiVersion: v1
kind: Service
metadata:
  name: {{ include "support-bot-openldap.fullname" . }}
  labels:
    {{- include "support-bot-openldap.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "support-bot-openldap.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ldap
      port: {{ .Values.service.port }}
      targetPort: ldap
      protocol: TCP
