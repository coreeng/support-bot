# Archived: OpenLDAP values for the former core-platform-app chart (osixia/openldap).
# Active installs use api/k8s/ldap/chart + values-bitnami.yaml.

fullnameOverride: ldap
replicaCount: 1

image:
  repository: osixia/openldap
  tag: 1.5.0
  pullPolicy: IfNotPresent

container:
  command: []
  args: []

service:
  enabled: true
  kind: Deployment
  type: ClusterIP
  port: 389
  additionalPorts: []

ingress:
  enabled: false

startupProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 36

livenessProbe:
  tcpSocket:
    port: http
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 5

readinessProbe:
  tcpSocket:
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

envVarsArr:
  - name: LDAP_ORGANISATION
    value: Support Bot
  - name: LDAP_DOMAIN
    value: supportbot.local
  - name: LDAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ldap-secrets
        key: admin-password
  - name: LDAP_TLS
    value: "false"
  - name: LDAP_REMOVE_CONFIG_AFTER_SETUP
    value: "false"

configMaps:
  - name: ldap-bootstrap
    data:
      10-ou.ldif: |
        dn: ou=People,dc=supportbot,dc=local
        objectClass: organizationalUnit
        ou: People

        dn: ou=Groups,dc=supportbot,dc=local
        objectClass: organizationalUnit
        ou: Groups
      20-users.ldif: |
        dn: uid=alice,ou=People,dc=supportbot,dc=local
        objectClass: inetOrgPerson
        objectClass: posixAccount
        objectClass: shadowAccount
        uid: alice
        sn: User
        givenName: Alice
        cn: Alice User
        displayName: Alice User
        mail: alice@supportbot.local
        userPassword: {SSHA}bim+tmQMR8i4Bu9W0BOJYH0ZkziIoSjf
        uidNumber: 10001
        gidNumber: 10001
        homeDirectory: /home/alice

        dn: uid=bob,ou=People,dc=supportbot,dc=local
        objectClass: inetOrgPerson
        objectClass: posixAccount
        objectClass: shadowAccount
        uid: bob
        sn: User
        givenName: Bob
        cn: Bob User
        displayName: Bob User
        mail: bob@supportbot.local
        userPassword: {SSHA}bim+tmQMR8i4Bu9W0BOJYH0ZkziIoSjf
        uidNumber: 10002
        gidNumber: 10002
        homeDirectory: /home/bob
      30-groups.ldif: |
        dn: cn=developers,ou=Groups,dc=supportbot,dc=local
        objectClass: groupOfUniqueNames
        objectClass: top
        cn: developers
        uniqueMember: uid=alice,ou=People,dc=supportbot,dc=local
        uniqueMember: uid=bob,ou=People,dc=supportbot,dc=local

        dn: cn=support-admins,ou=Groups,dc=supportbot,dc=local
        objectClass: groupOfUniqueNames
        objectClass: top
        cn: support-admins
        uniqueMember: uid=alice,ou=People,dc=supportbot,dc=local

        dn: cn=ldap-leadership,ou=Groups,dc=supportbot,dc=local
        objectClass: groupOfUniqueNames
        objectClass: top
        cn: ldap-leadership
        uniqueMember: uid=alice,ou=People,dc=supportbot,dc=local

volumes:
  - name: ldap-bootstrap
    configMap:
      name: ldap-ldap-bootstrap
  - name: ldap-data
    emptyDir: {}
  - name: ldap-slapd-config
    emptyDir: {}

volumeMounts:
  - name: ldap-bootstrap
    mountPath: /container/service/slapd/assets/config/bootstrap/ldif/custom
    readOnly: true
  - name: ldap-data
    mountPath: /var/lib/ldap
  - name: ldap-slapd-config
    mountPath: /etc/ldap/slapd.d
