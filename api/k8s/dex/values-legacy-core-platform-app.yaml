# Archived: Dex values for the former core-platform-app chart.
# Active installs use values-dexidp.yaml with chart dex/dex.

fullnameOverride: dex
replicaCount: 1

image:
  repository: ghcr.io/dexidp/dex
  tag: v2.44.0
  pullPolicy: IfNotPresent

container:
  command: ["dex", "serve", "/etc/dex/config.yaml"]
  args: []

service:
  enabled: true
  kind: Deployment
  type: ClusterIP
  port: 5556
  additionalPorts:
    - name: telemetry
      port: 5558
      containerPort: 5558

ingress:
  enabled: true
  className: ""
  appUrlSuffix: ""
  domain: ""
  annotations: {}
  hosts:
    - host: dex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 30
  timeoutSeconds: 2
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

envVarsArr:
  - name: DEX_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: client-secret
  - name: DEX_LDAP_BIND_PW
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: ldap-bind-password
  - name: DEX_GOOGLE_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: google-client-id
  - name: DEX_GOOGLE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: google-client-secret
  - name: DEX_MICROSOFT_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: microsoft-client-id
  - name: DEX_MICROSOFT_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: microsoft-client-secret

configMaps:
  - name: dex-config
    data:
      config.yaml: |
        issuer: {{ .Values.dex.issuer | quote }}
        storage:
          type: sqlite3
          config:
            file: /var/dex/dex.db
        web:
          http: 0.0.0.0:5556
        telemetry:
          http: 0.0.0.0:5558
        oauth2:
          skipApprovalScreen: true
        {{- if .Values.dex.enablePasswordDb }}
        enablePasswordDB: true
        staticPasswords:
          - email: {{ .Values.dex.localUser.email | quote }}
            hash: {{ .Values.dex.localUser.passwordHash | quote }}
            username: {{ .Values.dex.localUser.username | quote }}
            userID: {{ .Values.dex.localUser.userId | quote }}
        {{- else }}
        enablePasswordDB: false
        {{- end }}
        staticClients:
          - id: {{ .Values.dex.clientId | quote }}
            name: Support Bot
            secret: ${DEX_CLIENT_SECRET}
            redirectURIs:
        {{- range .Values.dex.redirectUris }}
              - {{ . | quote }}
        {{- end }}
        {{- if or .Values.dex.ldap.enabled .Values.dex.google.enabled .Values.dex.microsoft.enabled }}
        connectors:
        {{- if .Values.dex.ldap.enabled }}
          - type: ldap
            id: ldap
            name: LDAP
            config:
              host: {{ .Values.dex.ldap.host | quote }}
              insecureNoSSL: true
              bindDN: {{ .Values.dex.ldap.bindDN | quote }}
              bindPW: ${DEX_LDAP_BIND_PW}
              usernamePrompt: Email Address
              userSearch:
                baseDN: {{ .Values.dex.ldap.userSearchBaseDN | quote }}
                filter: "(objectClass=posixAccount)"
                username: mail
                idAttr: uid
                emailAttr: mail
                nameAttr: cn
              groupSearch:
                baseDN: {{ .Values.dex.ldap.groupSearchBaseDN | quote }}
                filter: "(objectClass=groupOfUniqueNames)"
                userMatchers:
                  - userAttr: DN
                    groupAttr: uniqueMember
                nameAttr: cn
        {{- end }}
        {{- if .Values.dex.google.enabled }}
          - type: google
            id: google
            name: Google
            config:
              clientID: ${DEX_GOOGLE_CLIENT_ID}
              clientSecret: ${DEX_GOOGLE_CLIENT_SECRET}
              redirectURI: {{ printf "%s/callback" (trimSuffix "/" .Values.dex.issuer) | quote }}
        {{- end }}
        {{- if .Values.dex.microsoft.enabled }}
          - type: microsoft
            id: microsoft
            name: Microsoft
            config:
              clientID: ${DEX_MICROSOFT_CLIENT_ID}
              clientSecret: ${DEX_MICROSOFT_CLIENT_SECRET}
              redirectURI: {{ printf "%s/callback" (trimSuffix "/" .Values.dex.issuer) | quote }}
              tenant: {{ .Values.dex.microsoft.tenant | quote }}
        {{- end }}
        {{- end }}

volumes:
  - name: dex-config
    configMap:
      name: dex-dex-config
  - name: dex-data
    emptyDir: {}

volumeMounts:
  - name: dex-config
    mountPath: /etc/dex/config.yaml
    subPath: config.yaml
    readOnly: true
  - name: dex-data
    mountPath: /var/dex

dex:
  issuer: https://dex.example.com
  enablePasswordDb: true
  clientId: support-bot-dex
  redirectUris:
    - https://support-bot-api.example.com/login/oauth2/code/dex
  google:
    enabled: false
  microsoft:
    enabled: false
    tenant: common
  ldap:
    enabled: false
    host: ldap:389
    bindDN: cn=admin,dc=supportbot,dc=local
    userSearchBaseDN: ou=People,dc=supportbot,dc=local
    groupSearchBaseDN: ou=Groups,dc=supportbot,dc=local
  localUser:
    email: admin@example.com
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    passwordHash: "$2a$10$6c9QhS23zYk8xH5fQ2fN4eWw6X8vY6A7gYVYsv5nYeD1yfknhkX9u"
