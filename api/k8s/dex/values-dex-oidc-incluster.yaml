# Optional overlay for Tier 2 OIDC integration Job (and any in-cluster-only traffic).
# Apply after values-integration.yaml so config.* maps merge; this replaces config.staticClients
# and config.connectors lists (Helm merges maps; lists replace — include full connector block).
#
# Align Support Bot API: DEX_ISSUER_URI must equal config.issuer (iss claim in Dex tokens).
# Dex static client must list http://127.0.0.1:8765/callback for the in-cluster Job listener.

config:
  issuer: http://dex:5556
  staticClients:
    - id: support-bot-dex
      name: Support Bot
      secret: helm-template-placeholder-client-secret
      redirectURIs:
        - http://127.0.0.1:8765/callback
        - https://support-bot-api.integration.example.com/login/oauth2/code/dex
  connectors:
    - type: ldap
      id: ldap
      name: LDAP
      config:
        host: ldap:389
        insecureNoSSL: true
        bindDN: cn=admin,dc=supportbot,dc=local
        bindPW: helm-template-placeholder-ldap-bind
        usernamePrompt: Email Address
        userSearch:
          baseDN: ou=People,dc=supportbot,dc=local
          filter: "(objectClass=posixAccount)"
          username: mail
          idAttr: uid
          emailAttr: mail
          nameAttr: cn
        groupSearch:
          baseDN: ou=Groups,dc=supportbot,dc=local
          filter: "(objectClass=groupOfUniqueNames)"
          userMatchers:
            - userAttr: DN
              groupAttr: uniqueMember
          nameAttr: cn
