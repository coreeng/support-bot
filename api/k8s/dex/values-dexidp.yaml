# Dex via official dexidp Helm chart (dex/dex). Chart: https://charts.dexidp.io
# Pin chart version in dex/Makefile (DEX_CHART_VERSION).
#
# Secrets (client secret, LDAP bind, OAuth connector keys) belong in the rendered
# config below for Helm template checks; override in a private values file or
# --set for real clusters — the dex chart does not expand ${ENV} in config.yaml.

fullnameOverride: dex
replicaCount: 1

image:
  repository: ghcr.io/dexidp/dex
  pullPolicy: IfNotPresent
  tag: v2.44.0

configSecret:
  create: true

volumes:
  - name: dex-data
    emptyDir: {}

volumeMounts:
  - name: dex-data
    mountPath: /var/dex

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: dex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  issuer: https://dex.example.com
  storage:
    type: sqlite3
    config:
      file: /var/dex/dex.db
  web:
    http: 0.0.0.0:5556
  telemetry:
    http: 0.0.0.0:5558
  oauth2:
    skipApprovalScreen: true
  enablePasswordDB: true
  staticPasswords:
    - email: admin@example.com
      hash: "$2a$10$6c9QhS23zYk8xH5fQ2fN4eWw6X8vY6A7gYVYsv5nYeD1yfknhkX9u"
      username: admin
      userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
  staticClients:
    - id: support-bot-dex
      name: Support Bot
      secret: helm-template-placeholder-client-secret
      redirectURIs:
        - https://support-bot-api.example.com/login/oauth2/code/dex
  connectors: []
