# Dex deployment values for core-platform-app chart.
# Usage (example):
#   helm upgrade --install support-bot-dex <core-platform-app-chart> -f api/k8s/dex/values.yaml

fullnameOverride: dex
replicaCount: 1

image:
  repository: ghcr.io/dexidp/dex
  tag: v2.44.0
  pullPolicy: IfNotPresent

container:
  command: ["dex", "serve", "/etc/dex/config.yaml"]
  args: []

service:
  enabled: true
  kind: Deployment
  type: ClusterIP
  port: 5556
  additionalPorts:
    - name: telemetry
      port: 5558
      containerPort: 5558

ingress:
  enabled: true
  className: ""
  appUrlSuffix: ""
  domain: ""
  annotations: {}
  hosts:
    - host: dex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 30
  timeoutSeconds: 2
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

envVarsArr:
  - name: DEX_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: dex-secrets
        key: client-secret

configMaps:
  - name: dex-config
    data:
      config.yaml: |
        issuer: {{ .Values.dex.issuer | quote }}
        storage:
          type: sqlite3
          config:
            file: /var/dex/dex.db
        web:
          http: 0.0.0.0:5556
        telemetry:
          http: 0.0.0.0:5558
        oauth2:
          skipApprovalScreen: true
        enablePasswordDB: true
        staticPasswords:
          - email: {{ .Values.dex.localUser.email | quote }}
            hash: {{ .Values.dex.localUser.passwordHash | quote }}
            username: {{ .Values.dex.localUser.username | quote }}
            userID: {{ .Values.dex.localUser.userId | quote }}
        staticClients:
          - id: {{ .Values.dex.clientId | quote }}
            name: Support Bot
            secret: ${DEX_CLIENT_SECRET}
            redirectURIs:
{{- range .Values.dex.redirectUris }}
              - {{ . | quote }}
{{- end }}

volumes:
  - name: dex-config
    configMap:
      name: dex-dex-config
  - name: dex-data
    emptyDir: {}

volumeMounts:
  - name: dex-config
    mountPath: /etc/dex/config.yaml
    subPath: config.yaml
    readOnly: true
  - name: dex-data
    mountPath: /var/dex

dex:
  issuer: https://dex.example.com
  clientId: support-bot-dex
  redirectUris:
    - https://support-bot-api.example.com/login/oauth2/code/dex
  localUser:
    email: admin@example.com
    username: admin
    userId: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    # Example hash for password "admin". Override per environment.
    passwordHash: "$2a$10$6c9QhS23zYk8xH5fQ2fN4eWw6X8vY6A7gYVYsv5nYeD1yfknhkX9u"
