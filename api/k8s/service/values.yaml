image:
  repository: support-bot
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  role:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 185
  runAsGroup: 185
  fsGroup: 185
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: support-bot.example
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  requests:
    cpu: 512m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

readinessProbe:
  httpGet:
    path: /health
    port: 8081
  failureThreshold: 6
  periodSeconds: 40
  successThreshold: 1
  timeoutSeconds: 2

metrics:
  enabled: true
  port: 8081

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    selector:
      matchLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Sanitisation configuration for data export (optional).
# When both lists are empty, no sanitisation is applied.
# Rendered into the ConfigMap application.yaml under summary-data.sanitisation.
sanitisation:
  patterns: []
  exceptions: []

# Auth allow-list configuration (optional).
# When both lists are empty, all SSO-authenticated users are allowed.
# Rendered into the ConfigMap application.yaml under security.allow-list.
auth:
  allowedDomains: []
  allowedEmails: []

# Optional typed Helm config for pr-review-tracking.
# This block is rendered into application.yaml only when enabled=true.
# Defaults to disabled so existing raw configMap.config behavior remains unchanged.
prReviewTracking:
  enabled: false
# Example:
# prReviewTracking:
#   enabled: true
#   pollCron: "0 0 9-18 * * 1-5" # Cron schedule for the lifecycle poller (example: 09:00 to 18:00 Mon–Fri)
#   prEmoji: "pr" # Slack emoji name added to the message when a PR is detected
#   tags: # Required when enabled: tag codes from enums.tags, applied when the bot auto-closes a ticket
#     - "pull-request" # Required when enabled: tag codes from enums.tags, applied when the bot auto-closes a ticket
#   impact: "prReview" # Required when enabled: impact code from enums.impacts, applied when the bot auto-closes a ticket
#   repositories:
#     - name: "coreeng/core-platform-environment" # Repository in org/repo format
#       owningTeam: "infra-integration" # Team code from enums.escalation-teams — escalated when the SLA is breached
#       sla: "PT48H"
#   github:
#     apiBaseUrl: "${GITHUB_API_BASE_URL:https://api.github.com}" # Supports GitHub Enterprise overrides
#     authMode: "${GITHUB_AUTH_MODE:token}" # token | app
#     token: "${GITHUB_TOKEN:}" # Used when authMode=token
#     appId: "${GITHUB_APP_ID:}" # Used when authMode=app
#     installationId: "${GITHUB_APP_INSTALLATION_ID:}" # Used when authMode=app
#     privateKeyPem: "${GITHUB_APP_PRIVATE_KEY_PEM:}" # Used when authMode=app

# Environment variables
env:
  - name: DB_URL
    value: "jdbc:postgresql://support-bot-db-postgresql:5432/supportbot"
  - name: DB_USERNAME
    value: "supportbot"
  - name: DB_PASSWORD
    value: "supportbotpassword"
  - name: SLACK_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_TOKEN
  - name: SLACK_SOCKET_TOKEN
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SOCKET_TOKEN
  - name: SLACK_SIGNING_SECRET
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: SLACK_SIGNING_SECRET
  - name: GITHUB_APP_PRIVATE_KEY_PEM
    valueFrom:
      secretKeyRef:
        name: support-bot
        key: GITHUB_APP_PRIVATE_KEY_PEM
        optional: true

# Analysis bundle ConfigMap volume mount (disabled by default).
# When enabled, mounts a ConfigMap as the analysis bundle zip file.
analysisBundle:
  enabled: false
  configMapName: "analysis-bundle"
  mountPath: "/app/analysis.zip"
  subPath: "analysis.zip"

# ConfigMap configuration
configMap:
  enabled: true
  create: true
  name: ""
  annotations: {}
  data:
    # your properties for application.yaml

# UI deployment (disabled by default for backward compatibility)
ui:
  enabled: false

  image:
    repository: support-bot-ui
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: support-bot-ui.example
        paths:
          - path: /
            pathType: ImplementationSpecific

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 3
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 1

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  env: []

